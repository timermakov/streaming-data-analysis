services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Internal (Docker network) + external (host) + controller listeners
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "lab1-kafka-cluster-001"
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data


  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      kafka:
        condition: service_healthy

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab1-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    command: python -m src.lab1.producer --delay 0.05
    volumes:
      - ./data:/app/data:ro
    profiles:
      - lab1

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab1-consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    command: python -m src.lab1.consumer
    volumes:
      - ./output:/app/output
      - ./checkpoints:/app/checkpoints
    profiles:
      - lab1

  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: lab2-flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      PYTHONPATH: /workspace
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./src:/workspace/src
      - ./data:/workspace/data:ro
      - ./output:/workspace/output
      - ./checkpoints:/workspace/checkpoints
      - ./savepoints:/workspace/savepoints
    profiles:
      - lab2

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: lab2-flink-taskmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      PYTHONPATH: /workspace
    depends_on:
      flink-jobmanager:
        condition: service_started
    volumes:
      - ./src:/workspace/src
      - ./data:/workspace/data:ro
      - ./output:/workspace/output
      - ./checkpoints:/workspace/checkpoints
      - ./savepoints:/workspace/savepoints
    profiles:
      - lab2

  lab2-producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab2-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: ecommerce-transactions
    command: python -m src.lab2.producer
    volumes:
      - ./data:/app/data:ro
    profiles:
      - lab2

  lab2-submit:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: lab2-flink-submit
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      PYTHONPATH: /workspace
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: ecommerce-transactions
      KAFKA_GROUP_ID: lab2-flink-consumer
    command: >
      bash -lc "
      sleep 10 &&
      flink run -d -m flink-jobmanager:8081
      -py /workspace/src/lab2/flink_job.py
      --pyFiles /workspace/src
      "
    volumes:
      - ./src:/workspace/src
      - ./data:/workspace/data:ro
      - ./output:/workspace/output
      - ./checkpoints:/workspace/checkpoints
      - ./savepoints:/workspace/savepoints
    profiles:
      - lab2

volumes:
  kafka-data:
